[tox]
envlist =
    py{311,312,313}-django{52}
    docs
    ruff
    type-checking
skip_missing_interpreters = true

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[gh-actions:env]
DJANGO =
    5.2: django52

[testenv]
extras =
    tests
    coverage
    setup-configuration
deps =
  django52: Django~=5.2.0
setenv =
    PYTHONPATH = {toxinidir}
    PGPASSWORD =
passenv =
    PGPORT
    DB_USER
    DB_HOST
    DB_PASSWORD
commands =
  pytest tests \
   --cov --cov-report xml \
   {posargs}

[testenv:ruff]
extras = tests
skipsdist = True
commands =
    ruff check --output-format=github .
    ruff format --check

[testenv:docs]
basepython=python
changedir=docs
skipsdist=true
extras =
    tests
    docs
    setup-configuration
allowlist_externals = make
commands=
    make SPHINXOPTS="-W" html
    make linkcheck

[testenv:type-checking]
deps = .[type-checking,tests,cors,csp,structlog]
skipsdist = True
commands = pyright --project pyright.pyproject.toml